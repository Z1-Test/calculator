name: Publish Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to publish from"
        required: true
        default: "main"

jobs:
  publish:
    runs-on: st-arc
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Dagger (ARC)
        uses: staytunedllp/devops/.github/actions/dagger-bootstrap@main
        with:
          namespace: dagger
          label_selector: name=dagger-engine
          prefer_same_node: "true"

      - name: Dagger Call Publish
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.0"
          verb: call
          # Use our main branch module for testing
          module: github.com/StaytunedLLP/devops/src@main
          args: >
            publish-package
            --source=.
            --github-token=env:GITHUB_TOKEN
            --ref=${{ github.ref }}
            --event-name=${{ github.event_name }}
            --input-branch=${{ github.event.inputs.branch }}
            --repo-owner=${{ github.repository_owner }}
            --repo-name=${{ github.event.repository.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
